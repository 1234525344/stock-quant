# Render.com 部署配置
services:
  - type: web
    name: stock-quant
    env: node
    region: oregon
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DEEPSEEK_API_KEY
        sync: false
