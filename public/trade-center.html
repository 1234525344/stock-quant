<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易中心 — 量化交易平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<link rel="stylesheet" href="/css/style.css">
<style>
:root {
  --bg: rgba(255,255,255,.03);
  --border: rgba(255,255,255,.06);
  --text: #c8cdf0;
  --muted: #5f6b8a;
  --accent: #818cf8;
  --green: #4ade80;
  --red: #ef4444;
  --yellow: #fbbf24;
}

body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }

/* layout */
.dashboard { padding: 16px 20px; max-width: 1300px; margin: 0 auto; }

/* control bar */
.control-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 16px 20px; margin-bottom: 14px;
  background: var(--bg); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 14px;
}
.control-bar label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 2px; }
.ctrl-group { display: flex; align-items: flex-end; gap: 6px; }
.ctrl-group input, .ctrl-group select {
  padding: 7px 10px; border: 1px solid rgba(255,255,255,.1); border-radius: 8px;
  background: rgba(255,255,255,.04); color: #e0e4f0; font-size: 13px; outline: none;
}
.ctrl-group input:focus, .ctrl-group select:focus { border-color: rgba(99,102,241,.4); }
.ctrl-group input { width: 80px; }
.ctrl-group input.wide { width: 260px; }
.ctrl-spacer { flex: 1; min-width: 8px; }

/* buttons */
.btn { padding: 8px 16px; border: none; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; transition: .2s; }
.btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,.35); }
.btn-primary:disabled { opacity: .35; cursor: not-allowed; transform: none; }
.btn-outline { border: 1px solid rgba(255,255,255,.15); background: transparent; color: var(--text); }
.btn-outline:hover { border-color: rgba(99,102,241,.3); }
.btn-danger { border: 1px solid rgba(239,68,68,.25); background: transparent; color: var(--red); }
.btn-sm { padding: 5px 12px; font-size: 11px; }
.btn-xs { padding: 3px 10px; font-size: 10px; border-radius: 6px; }

/* chip / tag */
.chip { padding: 5px 12px; border-radius: 16px; font-size: 11px; cursor: pointer;
  border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.02); color: #8890b5; transition: .15s; }
.chip:hover { border-color: rgba(99,102,241,.3); color: var(--text); }
.chip.selected { background: rgba(99,102,241,.18); border-color: #6366f1; color: #e0e4f0; }

/* metric row */
.metric-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
@media (max-width: 800px) { .metric-row { grid-template-columns: repeat(2, 1fr); } }
.metric-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 18px; text-align: center;
}
.metric-card .m-val { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.metric-card .m-lbl { font-size: 11px; color: var(--muted); }

/* panel */
.panel {
  background: var(--bg); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px;
}
.panel h3 { font-size: 14px; color: var(--text); margin: 0 0 12px 0; font-weight: 600; }

/* grid */
.panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 800px) { .panel-row { grid-template-columns: 1fr; } }

/* positions & trades */
.pos-row, .trade-row { display: flex; align-items: center; gap: 10px; padding: 7px 8px;
  border-radius: 8px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,.025); }
.trade-row .t-dir { padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; min-width: 32px; text-align: center; }
.trade-row .t-dir.BUY { background: rgba(239,68,68,.15); color: var(--red); }
.trade-row .t-dir.SELL { background: rgba(34,197,94,.15); color: var(--green); }

/* status dot */
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)} 50%{box-shadow:0 0 0 8px rgba(34,197,94,0)} }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
.status-dot.on { background: #22c55e; animation: pulse 2s infinite; }
.status-dot.off { background: #4b5563; }

/* collapsible */
.collapse-toggle { cursor: pointer; font-size: 12px; color: var(--accent); user-select: none; }
.collapse-body { display: none; margin-top: 10px; }
.collapse-body.open { display: block; }

/* evolver */
.evolve-progress { height: 4px; background: rgba(255,255,255,.05); border-radius: 2px; margin: 10px 0; overflow: hidden; }
.evolve-progress .fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a78bfa); border-radius: 2px; transition: width .3s; }
.param-diff { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 4px 0; }
.param-diff .pd-name { min-width: 70px; color: #8890b5; }
.param-diff .pd-old { color: #4b5563; text-decoration: line-through; min-width: 30px; text-align: center; }
.param-diff .pd-arrow { color: #6366f1; }
.param-diff .pd-new { color: var(--green); font-weight: 600; min-width: 30px; text-align: center; }
.param-diff .pd-pct { color: var(--yellow); font-size: 10px; margin-left: auto; }

/* guide / explain inline */
.inline-hint { font-size: 11px; color: var(--muted); margin-left: 6px; }
.plain-explain { background: rgba(99,102,241,.04); border: 1px solid rgba(99,102,241,.1);
  border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #8890b5; line-height: 1.6; }
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <a href="/" class="logo">量化交易平台</a>
    <span style="color:#8890b5;font-size:13px;">| 交易中心</span>
    <nav style="margin-left:auto;">
      <a href="/" class="nav-btn">← 主平台</a>
      <a href="/quantlab" class="nav-btn">量化工厂</a>
    </nav>
  </header>

  <div class="dashboard">
    <!-- ========== 控制栏 ========== -->
    <div class="control-bar">
      <div>
        <label>交易标的</label>
        <div class="ctrl-group">
          <input type="text" id="stockInput" class="wide" placeholder="600519,000858,300750"
            value="600519,000858,300750,601318,002415" />
          <button class="btn btn-outline btn-sm" id="btnQuickPick">快速选股</button>
        </div>
      </div>
      <div>
        <label>策略</label>
        <div class="ctrl-group">
          <select id="strategySelect">
            <option value="ma">双均线 MA5/MA20</option>
            <option value="macd">MACD 金叉</option>
            <option value="rsi">RSI 超买超卖</option>
            <option value="boll">布林带突破</option>
            <option value="multi">多因子综合</option>
            <option value="trend">趋势跟踪</option>
          </select>
          <button class="btn btn-outline btn-xs" id="btnToggleEvolve" title="AI策略进化">进化</button>
          <button class="btn btn-outline btn-xs" id="btnToggleAdvanced" title="自定义条件">高级</button>
        </div>
      </div>
      <div>
        <label>初始资金(万)</label>
        <input type="number" id="initCapital" value="100" style="width:80px;" />
      </div>
      <div>
        <label>止损% / 止盈%</label>
        <div class="ctrl-group">
          <input type="number" id="stopLossPct" value="8" style="width:55px;" />
          <span style="color:var(--muted);font-size:11px;">/</span>
          <input type="number" id="takeProfitPct" value="20" style="width:55px;" />
        </div>
      </div>
      <div class="ctrl-spacer"></div>
      <div style="display:flex;align-items:flex-end;gap:8px;">
        <span id="engineStatus" style="font-size:12px;"><span class="status-dot off"></span>待启动</span>
        <button class="btn btn-primary" id="btnStartEngine">▶ 启动</button>
        <button class="btn btn-outline btn-sm" id="btnStopEngine" disabled>⏹ 停止</button>
        <button class="btn btn-danger btn-xs" id="btnResetEngine">↺ 重置</button>
      </div>
    </div>

    <!-- 快速选股标签 -->
    <div id="quickPickTags" style="display:none;margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap;"></div>
    <!-- 股票预览标签 -->
    <div id="stockPreview" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;min-height:24px;"></div>

    <!-- ========== AI进化器面板 (可折叠) ========== -->
    <div class="panel" id="evolvePanel" style="display:none;">
      <h3>AI 策略进化器 <span style="font-weight:400;font-size:11px;color:var(--muted);">— 遗传算法搜索最优参数</span>
        <span class="panel-close" data-target="evolvePanel" style="float:right;cursor:pointer;font-size:14px;color:var(--muted);">✕</span>
      </h3>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input type="text" id="evolveCode" value="600519" style="width:100px;" placeholder="标的" />
        <select id="evolvePreset">
          <option value="ma">双均线</option><option value="macd">MACD</option>
          <option value="rsi">RSI</option><option value="multi">多因子</option>
        </select>
        <button class="btn btn-primary btn-sm" id="btnEvolve">开始进化</button>
        <span style="font-size:11px;color:var(--muted);">约1-2分钟，评估数百种参数组合</span>
      </div>
      <div class="evolve-progress" id="evolveProgress" style="display:none;"><div class="fill" id="evolveFill" style="width:0%"></div></div>
      <div id="evolveStatus" style="font-size:11px;color:var(--muted);margin-top:6px;"></div>
      <div id="evolveResult" style="margin-top:8px;max-height:240px;overflow-y:auto;"></div>
    </div>

    <!-- ========== 自定义条件面板 (可折叠) ========== -->
    <div class="panel" id="advancedPanel" style="display:none;">
      <h3>自定义条件 <span style="font-weight:400;font-size:11px;color:var(--muted);">— 覆盖策略模板</span>
        <span class="panel-close" data-target="advancedPanel" style="float:right;cursor:pointer;font-size:14px;color:var(--muted);">✕</span>
      </h3>
      <div id="condAddBar" class="ctrl-group" style="flex-wrap:wrap;"></div>
      <div id="condList" style="margin-top:8px;font-size:12px;"></div>
      <div style="margin-top:10px;display:flex;gap:12px;align-items:center;">
        <span style="font-size:11px;color:var(--muted);">信号逻辑：</span>
        <select id="condLogic" style="width:130px;">
          <option value="AND">AND — 全部满足</option>
          <option value="OR">OR — 任一满足</option>
          <option value="VOTE">VOTE — 加权投票</option>
        </select>
        <span id="voteRow" style="display:none;font-size:11px;color:var(--muted);">
          阈值 <input type="number" id="voteThreshold" value="0.5" step="0.05" min="0.2" max="1" style="width:50px;text-align:center;" />
        </span>
      </div>
    </div>

    <!-- ========== 度量卡片 ========== -->
    <div class="metric-row" id="acctMetrics"></div>

    <!-- ========== 持仓 + 交易日志 ========== -->
    <div class="panel-row">
      <div class="panel">
        <h3>持仓明细</h3>
        <div id="positionsBrief" style="font-size:12px;"></div>
      </div>
      <div class="panel">
        <h3>最近交易</h3>
        <div id="tradeLogBrief" style="max-height:260px;overflow-y:auto;font-size:12px;"></div>
      </div>
    </div>

    <!-- ========== 权益走势图 ========== -->
    <div class="panel">
      <h3>权益走势</h3>
      <div id="chartEquity" style="width:100%;height:260px;"></div>
    </div>

    <!-- ========== 底部可展开区 ========== -->
    <div class="panel-row">
      <div class="panel">
        <h3>市场宽度 <span id="marketMoodBrief" style="font-weight:400;font-size:12px;color:var(--muted);"></span></h3>
        <div id="activeSignals" style="font-size:12px;"></div>
      </div>
      <div class="panel">
        <h3>策略一致性
          <button class="btn btn-outline btn-xs" id="btnConsistency" style="margin-left:8px;">查询</button>
        </h3>
        <div id="consistencyReport" style="font-size:12px;"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (s, p = document) => p.querySelector(s);
const $$ = (s, p = document) => [...p.querySelectorAll(s)];

let tickTimer = null;
let condId = 0;
let customConds = [];
let equityChart = null;

// 事件委托：面板关闭按钮
document.addEventListener("click", (e) => {
  const closeBtn = e.target.closest(".panel-close");
  if (closeBtn) {
    const targetId = closeBtn.dataset.target;
    if (targetId) document.getElementById(targetId).style.display = "none";
  }
});

// ========== 快速选股 ==========
function getCodes() { return $("#stockInput").value.split(/[,，\s]+/).filter(Boolean); }
function updateStockPreview() {
  const codes = getCodes();
  $("#stockPreview").innerHTML = codes.map(c =>
    `<span class="chip selected" data-remove="${c}" title="点击移除">${c} ×</span>`
  ).join("") || '';
}
$("#stockInput").addEventListener("input", updateStockPreview);

// 事件委托：股票标签点击
$("#stockPreview").addEventListener("click", (e) => {
  const chip = e.target.closest("[data-remove]");
  if (chip) removeStock(chip.dataset.remove);
});
$("#quickPickTags").addEventListener("click", (e) => {
  const chip = e.target.closest("[data-add]");
  if (chip) addStock(chip.dataset.add);
});

$("#btnQuickPick").addEventListener("click", () => {
  const tags = $("#quickPickTags");
  tags.style.display = "flex";
  tags.innerHTML = [
    { c: "600519", n: "茅台" }, { c: "000858", n: "五粮液" },
    { c: "300750", n: "宁德时代" }, { c: "601318", n: "中国平安" },
    { c: "002415", n: "海康威视" }, { c: "600276", n: "恒瑞医药" },
    { c: "601012", n: "隆基绿能" }, { c: "000001", n: "平安银行" },
  ].map(s => `<span class="chip" data-add="${s.c}" title="${s.n}">${s.c} ${s.n}</span>`).join("");
});

function addStock(code) {
  const codes = getCodes();
  if (!codes.includes(code)) { codes.push(code); $("#stockInput").value = codes.join(","); updateStockPreview(); }
}
function removeStock(code) {
  $("#stockInput").value = getCodes().filter(c => c !== code).join(",");
  updateStockPreview();
}
updateStockPreview();

// ========== 策略 ==========
const PRESETS = {
  ma: { name: "双均线 MA5/MA20", conds: [{ id: 1, type: "ma_cross", dir: "buy", w: 1, p: { fast: 5, slow: 20 } }] },
  macd: { name: "MACD DIF/DEA", conds: [{ id: 1, type: "macd_cross", dir: "buy", w: 1, p: { fast: 12, slow: 26, signal: 9 } }] },
  rsi: { name: "RSI超买超卖", conds: [{ id: 1, type: "rsi_level", dir: "buy", w: 1, p: { period: 14, oversold: 30, overbought: 70 } }] },
  boll: { name: "布林带突破", conds: [{ id: 1, type: "boll_touch", dir: "buy", w: 1, p: { period: 20, multiplier: 2 } }] },
  multi: { name: "多因子(MA+MACD+RSI)", conds: [
    { id: 1, type: "ma_cross", dir: "buy", w: 1, p: { fast: 5, slow: 20 } },
    { id: 2, type: "macd_cross", dir: "buy", w: 1.5, p: { fast: 12, slow: 26, signal: 9 } },
    { id: 3, type: "rsi_level", dir: "buy", w: 0.5, p: { period: 14, oversold: 35, overbought: 70 } },
  ]},
  trend: { name: "趋势跟踪(MA+价格)", conds: [
    { id: 1, type: "ma_cross", dir: "buy", w: 1, p: { fast: 5, slow: 20 } },
    { id: 2, type: "price_vs_ma", dir: "buy", w: 1, p: { period: 60 } },
  ]},
};

function getStrategyConfig() {
  if (customConds.length) {
    return {
      name: "自定义策略",
      conditions: customConds.map(c => ({ id: c.id, type: c.type, direction: c.direction, weight: c.weight, params: c.params })),
      logic: $("#condLogic").value,
      voteThreshold: +($("#voteThreshold").value || 0.5),
    };
  }
  const key = $("#strategySelect").value;
  const p = PRESETS[key];
  return {
    name: p.name,
    conditions: p.conds.map(c => ({ id: c.id, type: c.type, direction: c.dir, weight: c.w, params: c.p })),
    logic: p.conds.length > 1 ? "VOTE" : "AND",
    voteThreshold: 0.5,
  };
}

// ========== 自定义条件 ==========
const COND_TYPES = {
  ma_cross: { name: "均线交叉", params: { fast: 5, slow: 20 }, help: "快线穿越慢线触发" },
  macd_cross: { name: "MACD交叉", params: { fast: 12, slow: 26, signal: 9 }, help: "DIF穿越DEA触发" },
  rsi_level: { name: "RSI超买超卖", params: { period: 14, oversold: 30, overbought: 70 }, help: "RSI超卖回升/超买回落" },
  boll_touch: { name: "布林带突破", params: { period: 20, multiplier: 2 }, help: "触及上下轨后反弹" },
  price_vs_ma: { name: "价格穿均线", params: { period: 60 }, help: "价格穿越均线触发" },
  kdj_cross: { name: "KDJ金叉/死叉", params: { period: 9 }, help: "K线穿越D线触发" },
  volume_spike: { name: "成交量异动", params: { period: 20, threshold: 1.5 }, help: "放量1.5倍+上涨=买入" },
};
$("#condAddBar").innerHTML = Object.entries(COND_TYPES).map(([t, info]) =>
  `<span class="chip" data-cond="${t}" title="${info.help}">+ ${info.name}</span>`
).join("");
// 事件委托：条件类型点击
$("#condAddBar").addEventListener("click", (e) => {
  const chip = e.target.closest("[data-cond]");
  if (chip) addCond(chip.dataset.cond);
});

$("#condLogic").addEventListener("change", function() {
  $("#voteRow").style.display = this.value === "VOTE" ? "inline" : "none";
});

function addCond(type) {
  const info = COND_TYPES[type];
  customConds.push({ id: ++condId, type, direction: "buy", weight: 1, params: { ...info.params } });
  renderConds();
}
function renderConds() {
  if (!customConds.length) {
    $("#condList").innerHTML = '<span style="color:var(--muted);">未添加自定义条件 — 将使用策略模板</span>';
    return;
  }
  $("#condList").innerHTML = customConds.map(c => {
    const info = COND_TYPES[c.type];
    const isBuy = c.direction === "buy";
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.025);">
      <b style="color:var(--accent);min-width:80px;">${info.name}</b>
      <select data-cond-id="${c.id}" data-key="direction" style="padding:2px 6px;border-radius:5px;font-size:10px;border:none;background:${isBuy?'rgba(239,68,68,.15)':'rgba(34,197,94,.15)'};color:${isBuy?'var(--red)':'var(--green)'};">
        <option value="buy" ${isBuy?'selected':''}>买入</option>
        <option value="sell" ${!isBuy?'selected':''}>卖出</option>
      </select>
      <span style="color:var(--muted);font-size:10px;">权重</span>
      <input type="number" value="${c.weight}" min="0.5" max="3" step="0.5" data-cond-id="${c.id}" data-key="weight" style="width:45px;padding:3px;font-size:10px;text-align:center;" />
      <span style="color:var(--muted);cursor:pointer;margin-left:auto;" data-remove-cond="${c.id}">✕</span>
    </div>`;
  }).join("");
}
// 事件委托：条件列表交互
$("#condList").addEventListener("change", (e) => {
  const id = +e.target.dataset.condId;
  const key = e.target.dataset.key;
  if (id && key) updateCond(id, key, e.target.tagName === "SELECT" ? e.target.value : +e.target.value);
});
$("#condList").addEventListener("click", (e) => {
  const id = +e.target.dataset.removeCond;
  if (id) { customConds = customConds.filter(x => x.id !== id); renderConds(); }
});
function updateCond(id, key, val) {
  const c = customConds.find(x => x.id === id);
  if (c) c[key] = val;
}

// ========== 面板折叠 ==========
$("#btnToggleEvolve").addEventListener("click", () => {
  const p = $("#evolvePanel");
  p.style.display = p.style.display === "none" ? "block" : "none";
});
$("#btnToggleAdvanced").addEventListener("click", () => {
  const p = $("#advancedPanel");
  p.style.display = p.style.display === "none" ? "block" : "none";
});

// ========== AI进化器 ==========
$("#btnEvolve").addEventListener("click", async () => {
  const code = $("#evolveCode").value.trim() || "600519";
  const presetKey = $("#evolvePreset").value;
  const preset = PRESETS[presetKey];
  const config = { name: preset.name, conditions: preset.conds.map(c => ({ id: c.id, type: c.type, direction: c.dir, weight: c.w, params: c.p })), logic: preset.conds.length > 1 ? "VOTE" : "AND", voteThreshold: 0.5 };

  const btn = $("#btnEvolve"); btn.disabled = true; btn.textContent = "进化中...";
  $("#evolveProgress").style.display = "block"; $("#evolveFill").style.width = "0%";
  $("#evolveStatus").textContent = "初始化种群 (24个随机参数组合)...";
  $("#evolveResult").innerHTML = "";

  let dots = 0;
  const progressInterval = setInterval(() => {
    dots = (dots + 1) % 4;
    const pct = Math.min(95, 10 + dots * 25);
    $("#evolveFill").style.width = pct + "%";
    const msgs = ["初始化种群...", "交叉变异中...", "评估适应度...", "精英保留+新一代..."];
    $("#evolveStatus").textContent = msgs[dots] || msgs[0];
  }, 2000);

  try {
    const resp = await fetch("/api/evolve", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code, config, days: 250, generations: 10, populationSize: 24 }),
    });
    const data = await resp.json();
    clearInterval(progressInterval);
    if (data.error) { alert(data.error); return; }

    const best = data.best;
    $("#evolveFill").style.width = "100%";
    $("#evolveStatus").textContent = `完成! 评估 ${data.totalEvaluations} 组参数, ${data.history.length} 代`;

    let html = `<div style="background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px;">
      <div style="font-size:13px;margin-bottom:4px;"><b>最优结果</b> <span style="font-size:10px;color:var(--muted);">第${best.generation}代</span></div>
      <div style="display:flex;gap:14px;font-size:12px;">
        <span>收益 <b style="color:${best.result.totalReturn>=0?'var(--red)':'var(--green)'}">${best.result.totalReturn>=0?'+':''}${best.result.totalReturn}%</b></span>
        <span>夏普 <b style="color:var(--accent)">${best.result.sharpe}</b></span>
        <span>胜率 <b>${best.result.winRate}%</b></span>
        <span>回撤 <b style="color:var(--yellow)">${best.result.maxDrawdown}%</b></span>
      </div>
    </div>`;

    html += '<div style="margin-top:6px;">';
    best.params.forEach(p => {
      const pctChange = Math.abs(p.evolved - p.original) / Math.max(0.01, p.original) * 100;
      const sig = pctChange > 20 ? '🔥' : pctChange > 10 ? '⚡' : '';
      html += `<div class="param-diff">
        <span class="pd-name">${p.condType}/${p.param}</span>
        <span class="pd-old">${p.original}</span><span class="pd-arrow">→</span>
        <span class="pd-new">${p.evolved}</span>
        <span class="pd-pct">${sig} ${pctChange.toFixed(0)}%</span>
      </div>`;
    });
    html += '</div>';
    html += `<button class="btn btn-outline btn-sm" data-apply-evolved="${encodeURIComponent(JSON.stringify(best.config))}" style="margin-top:8px;">应用进化参数</button>`;
    $("#evolveResult").innerHTML = html;
    // 绑定进化结果按钮事件
    $("#evolveResult").querySelector("[data-apply-evolved]")?.addEventListener("click", function() {
      applyEvolved(this.dataset.applyEvolved);
    });
  } catch (e) { clearInterval(progressInterval); alert("进化失败: " + e.message); }
  finally { btn.disabled = false; btn.textContent = "开始进化"; }
});

function applyEvolved(configStr) {
  const config = JSON.parse(decodeURIComponent(configStr));
  customConds = config.conditions.map(c => ({ id: ++condId, type: c.type, direction: c.direction, weight: c.weight, params: c.params }));
  renderConds();
  $("#advancedPanel").style.display = "block";
  alert("已应用进化参数到自定义条件！");
}

// ========== 引擎刷新 ==========
async function refreshEngine() {
  try {
    const [status, breadth] = await Promise.all([
      fetch("/api/paper/status").then(r => r.json()),
      fetch("/api/market/breadth").then(r => r.json()).catch(() => null),
    ]);

    const active = status.active;
    $("#engineStatus").innerHTML = active
      ? '<span class="status-dot on"></span><b style="color:var(--green);">运行中</b>'
      : '<span class="status-dot off"></span>待启动';
    $("#btnStartEngine").disabled = active;
    $("#btnStopEngine").disabled = !active;

    const eq = status.totalEquity || status.initialCapital || 0;
    const ret = status.totalReturn || 0;
    const rc = ret >= 0 ? "var(--red)" : "var(--green)";
    const balance = status.balance || 0;
    const totalTrades = status.trades?.length || 0;
    const wins = (status.trades || []).filter(t => t.pnlPct > 0).length;
    const wr = totalTrades > 0 ? (wins / totalTrades * 100).toFixed(0) : "--";

    // 4 度量卡片
    $("#acctMetrics").innerHTML = [
      ["总资产", "¥" + eq.toLocaleString(undefined, { maximumFractionDigits: 0 }), "#e0e4f0"],
      ["累计收益", (ret >= 0 ? "+" : "") + ret + "%", rc],
      ["可用资金", "¥" + balance.toLocaleString(undefined, { maximumFractionDigits: 0 }), "#8890b5"],
      ["胜率", wr + "%", +wr >= 50 ? "var(--red)" : "var(--green)"],
    ].map(([l, v, c]) =>
      `<div class="metric-card"><div class="m-val" style="color:${c}">${v}</div><div class="m-lbl">${l}</div></div>`
    ).join("");

    // 持仓
    const pos = Object.values(status.positions || {});
    if (pos.some(p => p.shares > 0)) {
      $("#positionsBrief").innerHTML = pos.filter(p => p.shares > 0).map(p => {
        const mktVal = p.shares * p.currentPrice;
        const costBasis = p.shares * p.avgCost;
        const pnl = costBasis > 0 ? ((mktVal - costBasis) / costBasis * 100).toFixed(2) : 0;
        const pnlColor = +pnl >= 0 ? "var(--red)" : "var(--green)";
        return `<div class="pos-row">
          <b style="color:var(--accent);min-width:60px;">${p.code}</b>
          <span style="color:var(--text);min-width:40px;">${p.name||''}</span>
          <span>${p.shares}股</span>
          <span style="color:var(--muted);">@${p.avgCost?.toFixed(2)}</span>
          <span style="color:#a5b4fc;">现${p.currentPrice?.toFixed(2)}</span>
          <span style="color:${pnlColor};font-weight:600;">${+pnl>=0?'+':''}${pnl}%</span>
        </div>`;
      }).join("");
    } else {
      $("#positionsBrief").innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;">暂无持仓 — 等待策略信号</div>';
    }

    // 交易日志
    const trades = (status.trades || []).slice(-15);
    if (trades.length) {
      $("#tradeLogBrief").innerHTML = [...trades].reverse().map(t => {
        const isBuy = t.action === "BUY";
        return `<div class="trade-row">
          <span class="t-dir ${t.action}">${isBuy?'买入':'卖出'}</span>
          <span style="color:var(--accent);">${t.code}</span>
          <span style="color:#8890b5;">${t.name||''}</span>
          <span>${t.shares}股 @${t.price?.toFixed(2)}</span>
          ${t.pnlPct != null ? `<span style="color:${t.pnlPct>=0?'var(--red)':'var(--green)'};font-weight:600;">${t.pnlPct>0?'+':''}${t.pnlPct}%</span>` : '<span>--</span>'}
          <span style="color:var(--muted);font-size:10px;margin-left:auto;">${t.date||''}</span>
        </div>`;
      }).join("");
    } else {
      $("#tradeLogBrief").innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;">启动后交易记录将在此显示</div>';
    }

    // 权益图
    const snaps = status.dailySnapshots || [];
    if (snaps.length) {
      if (!equityChart) equityChart = echarts.init($("#chartEquity"));
      equityChart.setOption({
        backgroundColor: "transparent",
        grid: { left: 12, right: 16, top: 18, bottom: 24 },
        xAxis: { type: "category", data: snaps.map(s => s.date.slice(5)), axisLabel: { color: "#5f6b8a", fontSize: 10 } },
        yAxis: { axisLabel: { color: "#5f6b8a", fontSize: 10, formatter: v => (v / 10000).toFixed(0) + "万" }, splitLine: { lineStyle: { color: "rgba(255,255,255,.04)" } } },
        tooltip: { trigger: "axis", backgroundColor: "rgba(15,19,48,.96)", borderColor: "rgba(255,255,255,.1)", textStyle: { color: "#e0e4f0" }, formatter: p => `${p[0].axisValue}<br/>权益: ¥${p[0].data.toLocaleString()}` },
        series: [{
          name: "权益", type: "line", data: snaps.map(s => s.equity),
          lineStyle: { color: "#818cf8", width: 2 },
          areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: "rgba(99,102,241,.2)" }, { offset: 1, color: "rgba(99,102,241,0)" }]) },
          symbol: "none",
          markLine: { silent: true, symbol: "none", data: [{ yAxis: status.initialCapital, lineStyle: { color: "#5f6b8a", type: "dashed" }, label: { formatter: "本金", color: "#5f6b8a" } }] },
        }],
      }, true);
    }

    // 市场宽度
    if (breadth && breadth.total) {
      const mood = breadth.breadth > 10 ? "市场强势" : breadth.breadth > 0 ? "偏强" : breadth.breadth > -10 ? "震荡" : "偏弱";
      const moodEmoji = breadth.breadth > 10 ? "🔥" : breadth.breadth > 0 ? "📈" : breadth.breadth > -10 ? "📊" : "📉";
      $("#marketMoodBrief").textContent = `— ${moodEmoji} ${mood}`;
      $("#activeSignals").innerHTML = `
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;font-size:11px;">
          <span>A股: <b>${breadth.total}</b>只</span>
          <span style="color:var(--red);">涨<b>${breadth.up}</b></span>
          <span style="color:var(--green);">跌<b>${breadth.down}</b></span>
          <span>平${breadth.flat}</span>
          <span style="color:var(--red);">涨停${breadth.limitUp}</span>
          <span style="color:var(--green);">跌停${breadth.limitDown}</span>
          <span>均涨 <b style="color:${breadth.avgChg>=0?'var(--red)':'var(--green)'}">${breadth.avgChg>=0?'+':''}${breadth.avgChg}%</b></span>
        </div>`;
    }
  } catch (e) { console.error(e); }
}

// ========== 引擎控制 ==========
$("#btnStartEngine").addEventListener("click", async () => {
  const codes = getCodes().join(",");
  if (!codes) { alert("请先输入股票代码"); return; }
  const config = getStrategyConfig();
  const capital = (+($("#initCapital").value || 100) * 10000);
  const btn = $("#btnStartEngine"); btn.disabled = true; btn.textContent = "启动中...";

  // 发送风控参数
  await fetch("/api/paper/start", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ codes, config, initialCapital: capital,
      stopLossPct: +($("#stopLossPct").value || 8),
      takeProfitPct: +($("#takeProfitPct").value || 20),
    }),
  });

  refreshEngine();
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(() => fetch("/api/paper/tick", { method: "POST" }).then(() => refreshEngine()).catch(() => {}), 30000);
  btn.textContent = "▶ 启动";
});

$("#btnStopEngine").addEventListener("click", async () => {
  await fetch("/api/paper/stop", { method: "POST" });
  clearInterval(tickTimer); tickTimer = null;
  refreshEngine();
});

$("#btnResetEngine").addEventListener("click", async () => {
  if (confirm("确定重置账户？所有交易记录和持仓将被清除。")) {
    await fetch("/api/paper/reset", { method: "POST" });
    clearInterval(tickTimer); tickTimer = null;
    refreshEngine();
  }
});

// ========== 策略一致性 ==========
$("#btnConsistency").addEventListener("click", async () => {
  const codes = getCodes();
  if (!codes.length) return;
  const code = codes[0];
  const stratMap = { ma: "maCrossStrategy", macd: "macdStrategy", rsi: "rsiStrategy", boll: "bollStrategy", multi: "multiFactorStrategy", trend: "trendFollowingStrategy" };
  const stratKey = stratMap[$("#strategySelect").value] || "maCrossStrategy";

  try {
    const resp = await fetch(`/api/consistency?code=${code}&strategy=${stratKey}&days=250`);
    const data = await resp.json();
    if (data.error) { $("#consistencyReport").innerHTML = `<span style="color:var(--muted);">${data.error}</span>`; return; }
    const r = data.report || {};
    const accColor = r.accuracy >= 60 ? "var(--green)" : r.accuracy >= 40 ? "var(--yellow)" : "var(--red)";
    const trendText = { improving: "准确率在提升，策略适应当前市场", declining: "准确率在下降，建议重新优化参数", stable: "准确率稳定" };

    $("#consistencyReport").innerHTML = `
      <div class="metric-row" style="grid-template-columns:repeat(5,1fr);margin-bottom:6px;">
        <div class="metric-card"><div class="m-val" style="font-size:18px;color:${accColor}">${r.accuracy||0}%</div><div class="m-lbl">总体准确率</div></div>
        <div class="metric-card"><div class="m-val" style="font-size:18px;color:var(--red)">${r.buyAccuracy||0}%</div><div class="m-lbl">买入准确率</div></div>
        <div class="metric-card"><div class="m-val" style="font-size:18px;color:var(--green)">${r.sellAccuracy||0}%</div><div class="m-lbl">卖出准确率</div></div>
        <div class="metric-card"><div class="m-val" style="font-size:18px;color:var(--text)">${r.recentAccuracy||0}%</div><div class="m-lbl">近期(10次)</div></div>
        <div class="metric-card"><div class="m-val" style="font-size:18px;color:var(--accent)">${r.avgEffectiveReturn||0}%</div><div class="m-lbl">平均有效收益</div></div>
      </div>
      <div class="plain-explain">
        <b>${trendText[r.trend]}</b>。共追踪 <b>${data.tracked?.length||0}</b> 个信号。
        ${r.accuracy >= 55 ? '策略整体可靠。' : r.accuracy >= 40 ? '有一定参考价值，建议结合其他指标。' : '准确率偏低，建议用AI进化器优化。'}
      </div>`;
  } catch (e) {}
});

window.addEventListener("resize", () => equityChart?.resize());

// 初始加载
refreshEngine();
</script>
